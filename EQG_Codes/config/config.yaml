# Knowledge Tree Config
KT:
  # KC Graph and Parameter Graph
  dataset_dir: "./data/dataset"
  graph_dir: "./data/KC_tree"

  # Output Paths
  EM_output_dir: "./output/EM-Results/"
  KT_output_dir: "./output/KT-Results/"
  state_graph_path_root: "./data/dataset"

  # EM
  dataset: "XES3G5M" # "XES3G5M" or "MOOCRadar"
  root_node: 'Application_Module' # XES3G5M: 'Application_Module / Computation_Module / Counting_Module', MOOCRadar: 'Wine_Knowledge / Circuit_Design / Education_Theory'
  burn_in_size: 10
  window_size: -1  # Sliding window size. -1 = use all historical data; >0 = use only the most recent N records
  early_stopping: false
  max_step: 20
  early_stopping_threshold: 0.01

  # KT
  save_intermediate_graph: false # save the intermediate graphs for all updates

  # Parameters Initialization

  initial_r_diff: [0.9, 0.8, 0.75]
  initial_gamma_root: 0.1
  initial_transition: 0.1
  initial_phi: 0.7 # overall emission, only for visualization, not used in the model
  initial_epsilon: 0.1
  num_sample_students: 10 # Number of other students to sample for burn-in data; -1 means use all students


# Verifier Config
verifier:
  dataset: "XES3G5M"

  raw_question_info:
    XES3G5M: "./data/dataset/XES3G5M/question_info.json"
    MOOCRadar: "./data/dataset/MOOCRadar/question_info.json"

  tree_dir: "./data/KC_tree"
  output_dir: "../Verifier"

  proto:
    train_ratio: 0.8
    seed: 42
    max_samples: 5000

  model:
    encoder_name: "sentence-transformers/all-MiniLM-L6-v2"
    proj_dim: 256
    freeze_encoder: false
    max_length: 256

  train:
    batch_size: 64
    max_epochs: 40
    lr: 1.0e-3
    encoder_lr: 1.0e-4
    weight_decay: 0.0
    tau: 0.07
    device: "cuda"
    log_every: 50
    use_hard_negatives: true
    wandb: true
    wandb_project: "EQG-Verifier"
    early_stopping: false
    early_metric: "cd_hit3"
    early_mode: "max"
    patience: 5
    min_delta: 0.001

  inference:
    ckpt_path: "simple_verifier.pt"

# Generator Config
generator:
  output_dir: "./output/Generator-Results/"
  csv_output_dir: "./output/Generator-Results/csv/"
